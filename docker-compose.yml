version: '3.8'

services:
  ai-notes-xyz-shell:
    build: .
    ports:
      # host:container — must match EXPRESS_PORT inside the container
      - "2001:2000"
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - EXPRESS_PORT=2000
      - API_TOKEN=${API_TOKEN:-}

